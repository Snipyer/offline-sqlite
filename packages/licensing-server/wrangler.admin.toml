name = "offline-sqlite-licensing-admin-api"
main = "src/admin-worker.ts"
compatibility_date = "2026-02-27"
workers_dev = false

[[d1_databases]]
binding = "LICENSE_DB"
database_name = "offline-sqlite-licensing"
database_id = "ffdcdfc3-9b8a-4954-a598-80dad7455ad7"

[vars]
# IMPORTANT: Set to your admin web domain in production (e.g. "https://admin.example.com")
# Use "http://localhost:8080" for local development. Never use "*" in production.
CORS_ORIGIN = "http://localhost:8080"
# ENVIRONMENT is intentionally NOT set here (defaults to non-production / dev).
# Deploy with `wrangler deploy --env production` to activate production guards.

[env.production]
name = "offline-sqlite-licensing-admin-api-production"

[[env.production.d1_databases]]
binding = "LICENSE_DB"
database_name = "offline-sqlite-licensing"
database_id = "ffdcdfc3-9b8a-4954-a598-80dad7455ad7"

[env.production.vars]
ENVIRONMENT = "production"
# Internal-only traffic via service binding; reject browser CORS by default.
CORS_ORIGIN = ""
# Single admin account allowed to perform admin actions.
ADMIN_ALLOWED_EMAIL = "snipyergaming@gmail.com"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
